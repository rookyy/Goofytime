services:
  goofytime:
    build: .
    container_name: goofytime
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/goofytime.db
      - TZ=Europe/Berlin
      # Telegram Bot (optional)
      # - TELEGRAM_BOT_TOKEN=123456:ABC-DEF
      # SMTP-Passwort-Verschlüsselung (optional, 64 Zeichen Hex)
      # - APP_ENCRYPTION_KEY=0123456789abcdef...
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
