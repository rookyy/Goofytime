{{define "login.html"}}
{{template "head" .}}
<div class="min-h-[calc(100vh-12rem)] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primaryLight rounded-full mb-4">
                    <i class="fas fa-clock text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Anmeldung</h1>
                <p class="text-gray-500 mt-1">Goofytime</p>
            </div>

            {{if .Error}}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>{{.Error}}
            </div>
            {{end}}

            <form method="POST" action="/login" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Benutzername</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm"
                        placeholder="Benutzername eingeben">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm"
                        placeholder="Passwort eingeben">
                </div>
                <button type="submit"
                    class="w-full bg-primaryLight hover:bg-primary text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 text-sm">
                    <i class="fas fa-sign-in-alt mr-2"></i> Anmelden
                </button>
            </form>
        </div>
    </div>
</div>
{{template "foot"}}
{{end}}
