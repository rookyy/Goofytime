{{define "profile.html"}}
{{template "head" .}}
<div class="fade-in max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Profil</h1>
    <p class="text-gray-500 text-sm mb-8">Persönliche Informationen für Exporte und E-Mails</p>

    {{if .Message}}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm fade-in">
        <i class="fas fa-check-circle mr-2"></i>{{.Message}}
    </div>
    {{end}}

    <div class="bg-white rounded-2xl shadow-xl p-8">
        <form method="POST" action="/profile" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">Vorname</label>
                    <input type="text" id="first_name" name="first_name" value="{{.Settings.FirstName}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
                </div>
                <div>
                    <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">Nachname</label>
                    <input type="text" id="last_name" name="last_name" value="{{.Settings.LastName}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
                </div>
            </div>
            <div>
                <label for="street" class="block text-sm font-medium text-gray-700 mb-1">Straße</label>
                <input type="text" id="street" name="street" value="{{.Settings.Street}}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div>
                <label for="zip_city" class="block text-sm font-medium text-gray-700 mb-1">PLZ / Ort</label>
                <input type="text" id="zip_city" name="zip_city" value="{{.Settings.ZipCity}}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                <input type="text" id="phone" name="phone" value="{{.Settings.Phone}}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
                <input type="email" id="email" name="email" value="{{.Settings.Email}}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div class="flex justify-end pt-2">
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primaryLight hover:bg-primary rounded-lg transition shadow-sm">
                    <i class="fas fa-save mr-1.5"></i> Speichern
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 mt-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Passwort ändern</h2>
        <form method="POST" action="/profile/password" class="space-y-4">
            <div>
                <label for="old_password" class="block text-sm font-medium text-gray-700 mb-1">Altes Passwort</label>
                <input type="password" id="old_password" name="old_password" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">Neues Passwort</label>
                <input type="password" id="new_password" name="new_password" required minlength="4"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Neues Passwort bestätigen</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="4"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primaryLight focus:border-primaryLight outline-none transition text-sm">
            </div>
            <div class="flex justify-end pt-2">
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primaryLight hover:bg-primary rounded-lg transition shadow-sm">
                    <i class="fas fa-key mr-1.5"></i> Passwort ändern
                </button>
            </div>
        </form>
    </div>
</div>
{{template "foot"}}
{{end}}
