{{define "entry_row"}}
<tr id="entry-{{.Entry.ID}}" class="hover:bg-gray-50 transition fade-in {{if .Entry.Billed}}opacity-60{{end}}">
    <td class="px-2 py-3 w-8">
        <input type="checkbox" class="entry-checkbox rounded border-gray-300 text-primaryLight focus:ring-primaryLight" value="{{.Entry.ID}}" onchange="updateBulkBar()">
    </td>
    <td class="px-2 py-3 text-sm text-gray-900 whitespace-nowrap">{{.Entry.Date}}</td>
    <td class="px-2 py-3 text-sm text-gray-600 whitespace-nowrap">{{.Entry.TimeFrom}}</td>
    <td class="px-2 py-3 text-sm text-gray-600 whitespace-nowrap">{{.Entry.TimeTo}}</td>
    <td class="px-2 py-3 text-sm font-medium text-gray-900 whitespace-nowrap">{{formatHours .Entry.Hours}}</td>
    <td class="px-2 py-3 text-sm text-gray-600 max-w-xs truncate" title="{{.Entry.Purpose}}">{{.Entry.Purpose}}</td>
    <td class="px-2 py-3 text-sm text-gray-500 whitespace-nowrap">{{.Entry.ClientName}}</td>
    <td class="px-2 py-3 text-right whitespace-nowrap">
        <div class="flex items-center justify-end space-x-1">
            <button hx-post="/entries/{{.Entry.ID}}/toggle-billed"
                hx-target="#entry-{{.Entry.ID}}"
                hx-swap="outerHTML"
                class="{{if .Entry.Billed}}text-green-500 hover:text-green-600 bg-green-50{{else}}text-gray-400 hover:text-green-500 hover:bg-green-50{{end}} transition p-1.5 rounded-lg"
                title="{{if .Entry.Billed}}Abgerechnet (klick zum Ändern){{else}}Noch nicht abgerechnet{{end}}">
                <i class="fas {{if .Entry.Billed}}fa-check-circle{{else}}fa-circle{{end}} text-sm"></i>
            </button>
            <button onclick="openEditModal({{.Entry.ID}})"
                class="text-gray-400 hover:text-primaryLight transition p-1.5 rounded-lg hover:bg-blue-50"
                title="Bearbeiten">
                <i class="fas fa-edit text-sm"></i>
            </button>
            <button hx-delete="/entries/{{.Entry.ID}}"
                hx-confirm="Eintrag wirklich löschen?"
                hx-target="#entry-{{.Entry.ID}}"
                hx-swap="outerHTML"
                class="text-gray-400 hover:text-red-500 transition p-1.5 rounded-lg hover:bg-red-50"
                title="Löschen">
                <i class="fas fa-trash text-sm"></i>
            </button>
        </div>
    </td>
</tr>
{{end}}
